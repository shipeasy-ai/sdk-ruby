# Pin the Ruby used to run this example's test suite.
#
# The example targets Rails 7.1, which requires Ruby >= 3.1 (the Gemfile also
# declares `ruby ">= 3.1"`). The host's system Ruby is 2.6, too old to even
# `bundle install`. This pins a modern Ruby provided by mise so that
# `bundle install && bin/rails test` works out of the box:
#
#   mise install        # ensure the version below is present
#   bundle install
#   bin/rails test
[tools]
ruby = "4.0.2"
